<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Crime Record Management System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="badge-icon">🛡️</div>
      <h1>CRIME RECORD<br>MANAGEMENT SYSTEM</h1>
      <p>Authorized Personnel Only</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} mb-2">
          <i class="bi bi-exclamation-triangle-fill"></i> {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">
          <i class="bi bi-person-fill"></i>&nbsp; Username
        </label>
        <input type="text" name="username" class="form-control"
               placeholder="Enter username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">
          <i class="bi bi-lock-fill"></i>&nbsp; Password
        </label>
        <input type="password" name="password" class="form-control"
               placeholder="Enter password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-accent w-100" style="justify-content:center; padding:.6rem;">
        <i class="bi bi-shield-lock-fill"></i>&nbsp; SIGN IN
      </button>
    </form>

    <div style="margin-top:1.5rem; padding-top:1rem; border-top:1px solid #222;">
      <p style="font-size:.72rem; color:#555; text-align:center; margin-bottom:.6rem;">DEMO CREDENTIALS</p>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:.5rem; font-size:.75rem; color:#888;">
        <div style="background:#161616; padding:.5rem .75rem; border-radius:6px;">
          <div style="color:#ff3333; font-weight:600;">Admin</div>
          <div>admin / admin123</div>
        </div>
        <div style="background:#161616; padding:.5rem .75rem; border-radius:6px;">
          <div style="color:#5bc0de; font-weight:600;">Officer</div>
          <div>officer1 / officer123</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
